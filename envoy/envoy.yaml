# gRPC-Web → gRPC
# ENVOY_CONFIG_VERIFY: cors_prefix_star_forward_preflight_20260407
#
# 브라우저 CORS: v3에서는 Cors 필터 + 라우트 typed_per_filter_config(CorsPolicy) 조합이 필요합니다.

admin:
  access_log_path: /tmp/admin_access.log
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: AUTO
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: chat_service
                            timeout: 0s
                            max_stream_duration:
                              grpc_timeout_header_max: 0s
                          typed_per_filter_config:
                            envoy.filters.http.cors:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.CorsPolicy
                              # 정규식 대신 prefix — 로컬/IPv6 루프백 포트 전부 허용
                              allow_origin_string_match:
                                - prefix: "http://localhost:"
                                - prefix: "http://127.0.0.1:"
                                - prefix: "http://[::1]:"
                              # Envoy CORS: "*" 이면 프리플라이트의 Request-Method/Headers 를 그대로 반사
                              allow_methods: "*"
                              allow_headers: "*"
                              expose_headers: "custom-header-1,grpc-status,grpc-message,grpc-status-details-bin"
                              max_age: "1728000"
                              allow_private_network_access: true
                              # Origin 불일치 시 OPTIONS 를 gRPC 업스트림으로 넘기지 않음(거기서 CORS 헤더 없음)
                              forward_not_matching_preflights: false
                http_filters:
                  # OPTIONS 프리플라이트는 cors가 먼저 처리하는 편이 안전
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.grpc_web
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: chat_service
      connect_timeout: 0.25s
      type: LOGICAL_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: chat_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 50051
