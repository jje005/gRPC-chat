# Docker/Podman 컨테이너 안에서 Envoy를 돌릴 때 사용합니다.
# 업스트림 gRPC는 "컨테이너 밖의 호스트" (같은 WSL 또는 Windows) 의 50051 입니다.
# docker-compose.yml 에서 host.docker.internal → host-gateway 로 묶어 줍니다.
#
# 로컬에서 envoy 바이너리만 쓸 때는 envoy.yaml (127.0.0.1) 을 그대로 쓰면 됩니다.

admin:
access_log_path: /tmp/admin_access.log
address:
 socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
listeners:
- name: listener_0
 address:
   socket_address: { address: 0.0.0.0, port_value: 8080 }
 filter_chains:
 - filters:
   - name: envoy.filters.network.http_connection_manager
     typed_config:
       "@type": type.googleapis.com/envoy.config.filter.network.http_connection_manager.v2.HttpConnectionManager
       codec_type: auto
       stat_prefix: ingress_http
       stream_idle_timeout: 0s
       route_config:
         name: local_route
         virtual_hosts:
         - name: local_service
           domains: ["*"]
           routes:
           - match: { prefix: "/" }
             route:
               cluster: chat_service
               max_grpc_timeout: 0s
               timeout:
                 seconds: 0
           cors:
             allow_origin_string_match:
             - prefix: "*"
             allow_methods: GET, PUT, DELETE, POST, OPTIONS
             allow_headers: keep-alive,user-agent,cache-control,content-type,content-transfer-encoding,custom-header-1,x-accept-content-transfer-encoding,x-accept-response-streaming,x-user-agent,x-grpc-web,grpc-timeout,authorization
             max_age: "1728000"
             expose_headers: custom-header-1,grpc-status,grpc-message
       http_filters:
       - name: envoy.filters.http.grpc_web
       - name: envoy.filters.http.cors
       - name: envoy.filters.http.router
clusters:
- name: chat_service
 connect_timeout: 0.25s
 type: logical_dns
 http2_protocol_options: {}
 lb_policy: round_robin
 load_assignment:
   cluster_name: cluster_0
   endpoints:
     - lb_endpoints:
         - endpoint:
             address:
               socket_address:
                 address: host.docker.internal
                 port_value: 50051
